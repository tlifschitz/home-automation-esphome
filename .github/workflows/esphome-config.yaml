name: esphome

# 1. validate: `esphome config` on every devices/*.yaml (fast schema check).
# 2. build:    `esphome compile` per device, runs only if every validate matrix
#              job passed. PlatformIO toolchains and the per-device build dir
#              are cached so reruns skip the heavy framework download.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Enumerate devices/*.yaml into a JSON array consumed as a dynamic matrix below.
  list-devices:
    runs-on: ubuntu-latest
    outputs:
      files: ${{ steps.find.outputs.files }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          files=$(ls devices/*.yaml | jq -R -s -c '[split("\n")[] | select(length>0)]')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          echo "Discovered devices: $files"

  validate:
    needs: list-devices
    runs-on: ubuntu-latest
    # Official ESPHome image — esphome is already installed, no pip step needed.
    container:
      image: ghcr.io/esphome/esphome:stable
    strategy:
      fail-fast: false  # one bad device shouldn't hide failures in the others
      matrix:
        file: ${{ fromJSON(needs.list-devices.outputs.files) }}
    steps:
      - uses: actions/checkout@v4

      - name: Write CI-only secrets stub
        shell: bash
        run: |
          # `esphome config` resolves every !secret reference, so it needs a
          # secrets.yaml even though the values are never used.
          cat > common/secrets.yaml <<'EOF'
          wifi_ssid: "ci-ssid"
          wifi_password: "ci-password-12345"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci-ota-password"
          fallback_ap_password: "ci-fallback-pass"
          EOF

      - name: esphome config ${{ matrix.file }}
        shell: bash
        run: esphome config "${{ matrix.file }}"

  build:
    # Only run if every validate matrix job succeeded. Job-level `needs:` waits
    # for the whole matrix, so a single failing device blocks the whole build
    # stage — which is what we want (don't waste CI minutes compiling against
    # broken config).
    # Both deps are listed because GitHub Actions only exposes
    # `needs.<job>.outputs.*` for jobs named in `needs:` directly — even though
    # `validate` already depends on `list-devices` transitively.
    needs: [list-devices, validate]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:stable
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJSON(needs.list-devices.outputs.files) }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive device name
        id: dev
        shell: bash
        run: echo "name=$(basename '${{ matrix.file }}' .yaml)" >> "$GITHUB_OUTPUT"

      - name: Write CI-only secrets stub
        shell: bash
        run: |
          cat > common/secrets.yaml <<'EOF'
          wifi_ssid: "ci-ssid"
          wifi_password: "ci-password-12345"
          api_encryption_key: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
          ota_password: "ci-ota-password"
          fallback_ap_password: "ci-fallback-pass"
          EOF

      # PlatformIO downloads the framework + toolchain on first compile (~hundreds
      # of MB). GHA's container jobs override $HOME to /github/home, so PlatformIO
      # writes to /github/home/.platformio — NOT /root/.platformio (which is the
      # image's pre-baked content and useless for live caching).
      - name: Cache PlatformIO toolchains
        uses: actions/cache@v4
        with:
          path: /github/home/.platformio
          key: pio-${{ runner.os }}-esphome-stable-${{ hashFiles('devices/*.yaml', 'common/*.yaml') }}
          restore-keys: |
            pio-${{ runner.os }}-esphome-stable-

      # ESPHome puts `.esphome/` next to the YAML file (in devices/). Caching only
      # build/<name>/ isn't enough: ESPHome reads sibling state files in storage/
      # and idedata/ to decide whether "core config or version changed." If those
      # are missing, it wipes .pioenvs/.piolibdeps on every run and the build-dir
      # cache is thrown away. So we include all per-device state here. Per-device
      # key so a change in one YAML doesn't bust the other device's incremental.
      - name: Cache esphome build (${{ steps.dev.outputs.name }})
        uses: actions/cache@v4
        with:
          path: |
            devices/.esphome/build/${{ steps.dev.outputs.name }}
            devices/.esphome/storage/${{ steps.dev.outputs.name }}.yaml.json
            devices/.esphome/storage/${{ steps.dev.outputs.name }}.yaml.validated.yaml
            devices/.esphome/idedata/${{ steps.dev.outputs.name }}.json
          key: esphome-${{ steps.dev.outputs.name }}-${{ hashFiles(matrix.file, 'common/*.yaml') }}
          restore-keys: |
            esphome-${{ steps.dev.outputs.name }}-

      - name: esphome compile ${{ matrix.file }}
        shell: bash
        run: esphome compile "${{ matrix.file }}"
