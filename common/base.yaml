# Universal config fragment for every node in this repo.
# Pull in from a device YAML via:
#
#   packages:
#     base: !include ../common/base.yaml
#
# Expects the device file to define ${friendly_name} in substitutions.

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Fallback hotspot if WiFi fails — handy during first bring-up
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret fallback_ap_password
  power_save_mode: none

captive_portal:

debug:
  update_interval: 30s

# Diagnostic entities every node should expose
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "Uptime Timestamp"
    type: timestamp
    entity_category: diagnostic

  - platform: debug
    free:
      name: "Heap Free"
    block:                                # largest contiguous free block
      name: "Heap Largest Free Block"     # if this is << free, fragmentation is biting
    fragmentation:
      name: "Heap Fragmentation"
    loop_time:
      name: "Loop Time"

binary_sensor:
  - platform: status
    name: "Status"

text_sensor:
  - platform: debug
    reset_reason:
      name: "Reset Reason"
    device:
      name: "Device Info"                 # board, framework, compile date, etc.

  - platform: version
    name: "ESPHome Version"
    entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

  - platform: safe_mode
    name: "Restart (Safe Mode)"           # boots minimal config — OTA rescue lifeline
    entity_category: diagnostic
