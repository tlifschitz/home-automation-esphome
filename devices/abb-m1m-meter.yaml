# ABB M1M 12 power meter via Modbus RTU
# Hardware: Wemos D1 mini (ESP8266) + MAX485 module.
# See abb-m1m-meter.md for wiring and bring-up notes.
#
# REGISTER MAP — IMPORTANT
# ------------------------
# The M1M 12 uses the LEGACY ABB M1M register map (32-bit IEEE 754 floats
# in the 100..160 decimal address range, word-swapped CDAB byte order).
# This is NOT the same as the M1M 15/20/30 map in the "M1M 96 Modbus
# Manual V1.3C" (scaled 32/64-bit integers at 0x5B00..). Don't be fooled
# by ABB grouping them under the same product family — the wire formats
# are completely different.
#
# Addresses here are sourced from a previously-working Python script that
# successfully read this exact meter. Each per-phase quantity is laid out
# as [Total, L1, L2, L3] floats back-to-back (2 registers each, so phase
# stride = +2). For single-phase use we read the L1 address.

substitutions:
  device_name: abb-m1m-meter
  friendly_name: "ABB M1M Meter"

  # ---- Meter side: must match what's configured on the M1M ----
  modbus_address: "1"
  modbus_baud: "19200"
  modbus_parity: EVEN       # M1M 12 default is Even — confirm on front panel
  modbus_stop_bits: "1"

  # ---- ESP side: Wemos D1 mini pins (UART0 swapped to GPIO13/15) ----
  modbus_tx_pin: GPIO15           # D8 -> MAX485 DI
  modbus_rx_pin: GPIO13           # D7 <- MAX485 RO
  modbus_flow_control_pin: GPIO5  # D1 -> MAX485 DE+RE

  poll_interval: 10s

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: d1_mini
  restore_from_flash: true

packages:
  base:   !include ../common/base.yaml
  modbus: !include ../common/modbus-rtu.yaml

# Override base.yaml's logger: disable hardware UART output so GPIO2 is
# free for the built-in LED below. (On ESP8266 with UART0 used for Modbus
# via UART0_SWAP, the logger's only remaining hardware option is UART1 on
# GPIO2, which would conflict with the LED.) Logs still go over WiFi/API.
logger:
  baud_rate: 0

# ---- Globals for the diagnostic sensors ---------------------------------
globals:
  - id: m1m_last_success_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: m1m_success_count
    type: uint32_t
    restore_value: no
    initial_value: '0'

# ---- Built-in LED on Wemos D1 mini (GPIO2, active-low) -----------------
# Flashed briefly on every successful Modbus read so you can visually
# confirm the bus is talking without opening logs or HA.
output:
  - platform: gpio
    pin:
      number: GPIO2
      inverted: true
    id: builtin_led

modbus_controller:
  - id: m1m
    address: ${modbus_address}
    modbus_id: mod_bus
    setup_priority: -10
    update_interval: ${poll_interval}
    command_throttle: 1000ms
    allow_duplicate_commands: false
    max_cmd_retries: 2

# ---- Sensors -------------------------------------------------------------
# All values are 32-bit IEEE 754 floats. Use FP32_R (word-swapped) because
# the M1M 12 sends the low word first. Raw values come out in the unit
# stated by the register table; no scaling filter is needed except for
# energy (Wh -> kWh for the HA Energy dashboard).

sensor:
  # ---- Voltage L1 (Phase voltage L-N) ----
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Voltage"
    id: m1m_voltage
    register_type: holding
    address: 142            # VLN L1
    value_type: FP32_R
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1
    filters:
      - delta: 0.5

  # ---- Current L1 ----
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Current"
    id: m1m_current
    register_type: holding
    address: 150            # Current L1
    value_type: FP32_R
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - delta: 0.5

  # ---- Active power L1 ----
  # No delta filter on this one — its on_value hook fires every poll and
  # drives the LED blink + liveness tracking for the diagnostic sensors.
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Active Power"
    id: m1m_active_power
    register_type: holding
    address: 102            # Active Power L1 (Total is at 100)
    value_type: FP32_R
    unit_of_measurement: W
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    on_value:
      then:
        - lambda: |-
            id(m1m_last_success_ms) = millis();
            id(m1m_success_count) += 1;
        - output.turn_on: builtin_led
        - delay: 50ms
        - output.turn_off: builtin_led

  # ---- Apparent power L1 ----
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Apparent Power"
    id: m1m_apparent_power
    register_type: holding
    address: 126            # Apparent Power L1 (Total is at 124)
    value_type: FP32_R
    unit_of_measurement: VA
    device_class: apparent_power
    state_class: measurement
    accuracy_decimals: 1

  # ---- Power factor L1 ----
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Power Factor"
    id: m1m_power_factor
    register_type: holding
    address: 118            # PF L1 (Total / "PF Ave Inst" at 116)
    value_type: FP32_R
    device_class: power_factor
    state_class: measurement
    accuracy_decimals: 3

  # ---- Frequency ----
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Frequency"
    id: m1m_frequency
    register_type: holding
    address: 156
    value_type: FP32_R
    unit_of_measurement: Hz
    device_class: frequency
    state_class: measurement
    accuracy_decimals: 2
    filters:
      - delta: 0.2

  # ---- Active energy imported — feeds the HA Energy dashboard ----
  # Meter reports in Wh; we multiply by 0.001 so HA sees kWh, which is
  # the natural unit for Energy dashboard cost calculations.
  - platform: modbus_controller
    modbus_controller_id: m1m
    name: "Energy Imported"
    id: m1m_energy_import
    register_type: holding
    address: 158            # Active Energy Imported (Wh)
    value_type: FP32_R
    unit_of_measurement: kWh
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
      - delta: 0.5
    skip_updates: 9

  # ---- Diagnostic: time since last successful Modbus read ---------------
  - platform: template
    name: "Modbus Seconds Since Last Read"
    id: m1m_seconds_since_last
    unit_of_measurement: s
    device_class: duration
    state_class: measurement
    entity_category: diagnostic
    update_interval: 10s
    accuracy_decimals: 0
    lambda: |-
      if (id(m1m_last_success_ms) == 0) return NAN;
      return (millis() - id(m1m_last_success_ms)) / 1000.0f;

  # ---- Diagnostic: total successful reads since boot --------------------
  - platform: template
    name: "Modbus Successful Reads"
    id: m1m_success_reads
    state_class: total_increasing
    entity_category: diagnostic
    update_interval: 30s
    accuracy_decimals: 0
    lambda: |-
      return id(m1m_success_count);

# ---- Diagnostic: online/offline binary sensor ---------------------------
binary_sensor:
  - platform: template
    name: "Modbus Online"
    id: m1m_online
    device_class: connectivity
    entity_category: diagnostic
    lambda: |-
      if (id(m1m_last_success_ms) == 0) return false;
      // Online if a successful read happened within the last 3 polls
      // (poll_interval is 10s, so 30s grace). Adjust if you change
      // poll_interval.
      return (millis() - id(m1m_last_success_ms)) < 30000;