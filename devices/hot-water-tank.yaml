# Hot water tank temperature monitor
# Hardware: Wemos D1 mini (ESP8266) + DS18B20 one-wire temperature probe(s).
# See hot-water-tank.md for wiring and bring-up notes.
#
# PROBES
# ------
# Built two-probe-capable. The TOP probe is active now (clamped to the external
# tank metal, replacing the mechanical temp dial). A BOTTOM probe goes inside the
# tank later, when the heater's lower section is disassembled — its sensor block
# is below, commented out.
#
# IMPORTANT: with a single sensor on the bus, `address:` is optional. The moment a
# second sensor is added the bus is ambiguous and BOTH sensors MUST carry an
# explicit `address:` or the config won't validate. Discover the ROM(s) by flashing
# once with no address and reading them from `esphome logs`.

substitutions:
  device_name: hot-water-tank
  friendly_name: "Hot Water Tank"
  one_wire_pin: GPIO4          # D2 on the Wemos D1 mini
  poll_interval: 2s

  # ---- OLED (GME12864 SSD1306 128x64, I2C) ----
  # GPIO4 is taken by the one-wire bus, so I2C uses two other free, boot-safe
  # pins. (Avoid GPIO0/2/15 for I2C: their boot-strapping levels clash with the
  # bus idling high.)
  display_sda_pin: GPIO12      # D6 -> OLED SDA
  display_scl_pin: GPIO14      # D5 -> OLED SCL

  # ---- Heating indicator (LDR on A0 watching the 220 V panel lamp) ----
  # Thresholds are in ESPHome's A0 chip-scale units (0–1.0 V). TUNE them per the
  # "Heating indicator (LDR)" section in hot-water-tank.md.
  ldr_threshold_on: "0.035"     # lamp ON  above this
  ldr_threshold_off: "0.028"    # lamp OFF below this (gap = hysteresis band)

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: d1_mini

packages:
  base: !include ../common/base.yaml

# DS18B20(s) on a single GPIO one-wire bus. 4.7 kΩ pull-up from data to 3V3.
one_wire:
  - platform: gpio
    pin: ${one_wire_pin}

# I2C bus for the OLED.
i2c:
  sda: ${display_sda_pin}
  scl: ${display_scl_pin}
  frequency: 400kHz

# Only the glyphs we actually draw, to keep flash small. '°' is the UTF-8
# degree sign (U+00B0) — it must be listed explicitly or "%.1f °C" prints blank.
font:
  - file: "gfonts://Roboto"
    id: font_temp
    size: 26
    glyphs: "0123456789.- °C"
  # Material Design Icons — a friendlier face than plain text.
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icons          # large, left of the temperature
    size: 36
    glyphs:
      - "\U000F050F"  # mdi-thermometer
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icon_small     # small, top-right corner — heating indicator
    size: 18
    glyphs:
      - "\U000F0238"  # mdi-fire (shown while the panel lamp is on)

# GME12864-11/12/13 V3.2 = SSD1306 128x64 at I2C 0x3C.
# If the image is shifted/garbled, the module is the SH1106 variant instead:
# change `model` to "SH1106 128x64".
display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    address: 0x3C
    lambda: |-
      float t = id(tank_top_temp).state;
      // Thermometer icon (always) on the left, temperature right-aligned.
      // Both vertically centered on the 64px-tall panel.
      it.print(8, 32, id(font_icons), TextAlign::CENTER_LEFT, "\U000F050F");
      if (isnan(t)) {
        it.print(120, 32, id(font_temp), TextAlign::CENTER_RIGHT, "-- °C");
      } else {
        it.printf(120, 32, id(font_temp), TextAlign::CENTER_RIGHT, "%.1f°C", t);
      }
      // Heating indicator (LDR watching the panel lamp): fire in the top-right.
      if (id(heater_on).state) {
        it.print(127, 0, id(font_icon_small), TextAlign::TOP_RIGHT, "\U000F0238");
      }

sensor:
  # ---- Heating indicator: LDR on A0 watching the 220 V panel lamp ----
  # The D1 mini's onboard 220k/100k divider makes A0 0–3.3 V tolerant, so a plain
  # LDR divider off 3V3 is safe (brighter -> higher reading). See the .md for the
  # circuit and tuning. The EMA smooths 100 Hz mains ripple / noise (τ ≈ 2 s).
  - platform: adc
    pin: A0
    id: heater_ldr
    name: "Heater Indicator LDR"
    update_interval: 200ms
    accuracy_decimals: 3
    entity_category: diagnostic
    filters:
      - exponential_moving_average:
          alpha: 0.7
          send_every: 1

  # ---- Top probe (active): clamped to external tank metal, replaces the dial ----
  # First flash with NO `address:` to discover the ROM in the logs, then pin it
  # so adding the second probe later can't reassign which sensor is which.
  - platform: dallas_temp
    address: 0x3156d9d446a61328
    name: "Tank Top Temperature"
    id: tank_top_temp
    update_interval: ${poll_interval}
    resolution: 12
    filters:
      - filter_out: 85.0   # DS18B20 power-on / failed-conversion reset value
      - filter_out: nan

  # ---- Bottom probe (FUTURE): inside the tank, added when heater is opened ----
  # When this is enabled, BOTH sensors MUST carry an explicit `address:` (the bus
  # is ambiguous with >1 device and the config will fail to validate otherwise).
  # - platform: dallas_temp
  #   address: 0x0000000000000000
  #   name: "Tank Bottom Temperature"
  #   id: tank_bottom_temp
  #   update_interval: ${poll_interval}
  #   resolution: 12
  #   filters:
  #     - filter_out: 85.0
  #     - filter_out: nan

# ---- "Heating" from the LDR, with hysteresis + debounce ------------------
# analog_threshold gives built-in hysteresis (upper/lower); the delays reject
# brief glitches and tolerate short dropouts of the lamp. (Merges with the
# `status` binary_sensor from common/base.yaml.)
binary_sensor:
  - platform: analog_threshold
    id: heater_on
    name: "Heating"
    sensor_id: heater_ldr
    device_class: heat
    threshold:
      upper: ${ldr_threshold_on}
      lower: ${ldr_threshold_off}

# ---- TEMP tuning aid -----------------------------------------------------
# The generic sensor value is logged at VERBOSE, so it's invisible at the
# default DEBUG level. This prints the (EMA-filtered) LDR value every second
# so you can read lamp-off vs lamp-on and set ldr_threshold_on/off.
# REMOVE this block once the thresholds are calibrated.
interval:
  - interval: 1s
    then:
      - logger.log:
          format: "LDR raw = %.3f"
          args: ['id(heater_ldr).state']
