# Hot water tank temperature monitor
# Hardware: Wemos D1 mini (ESP8266) + DS18B20 one-wire temperature probe(s).
# See hot-water-tank.md for wiring and bring-up notes.
#
# PROBES
# ------
# Built two-probe-capable. The TOP probe is active now (clamped to the external
# tank metal, replacing the mechanical temp dial). A BOTTOM probe goes inside the
# tank later, when the heater's lower section is disassembled — its sensor block
# is below, commented out.
#
# IMPORTANT: with a single sensor on the bus, `address:` is optional. The moment a
# second sensor is added the bus is ambiguous and BOTH sensors MUST carry an
# explicit `address:` or the config won't validate. Discover the ROM(s) by flashing
# once with no address and reading them from `esphome logs`.

substitutions:
  device_name: hot-water-tank
  friendly_name: "Hot Water Tank"
  one_wire_pin: GPIO4          # D2 on the Wemos D1 mini
  poll_interval: 2s
  log_level: WARN              # or NONE for total silence
  log_baud_rate: "0"           # disables UART logging entirely


  # ---- OLED (GME12864 SSD1306 128x64, I2C) ----
  # GPIO4 is taken by the one-wire bus, so I2C uses two other free, boot-safe
  # pins. (Avoid GPIO0/2/15 for I2C: their boot-strapping levels clash with the
  # bus idling high.)
  display_sda_pin: GPIO12      # D6 -> OLED SDA
  display_scl_pin: GPIO14      # D5 -> OLED SCL

  # ---- Heating indicator (LDR on A0 watching the 220 V panel lamp) ----
  # Thresholds are in ESPHome's A0 chip-scale units (0–1.0 V). TUNE them per the
  # "Heating indicator (LDR)" section in hot-water-tank.md.
  ldr_threshold_on: "0.035"     # lamp ON  above this
  ldr_threshold_off: "0.028"    # lamp OFF below this (gap = hysteresis band)

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp8266:
  board: d1_mini

packages:
  base: !include ../common/base.yaml

# millis() timestamp of the last heating ON/OFF transition; drives the
# "Heating mm:ss / Idle hh:mm:ss" timer on the display.
globals:
  - id: heater_changed_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # ---- Daily stats (reset at midnight; not persisted across reboots) ----
  - id: temp_max_today
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: temp_min_today
    type: float
    restore_value: no
    initial_value: 'NAN'
  - id: cycles_today
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: on_time_today_s
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # ---- Monotonic lifetime counters for HA (total_increasing + utility_meter).
  # NOT reset at midnight; a reboot resets them to 0, which utility_meter
  # absorbs as a meter reset. No restore_value -> no flash wear. HA slices
  # them into daily/weekly/monthly; the display keeps using the daily globals. ----
  - id: on_time_total_s
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: cycles_total
    type: uint32_t
    restore_value: no
    initial_value: '0'
  # millis() of the last display page switch (for per-page dwell timing).
  - id: page_changed_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

# Clock for the daily-stats midnight reset (SNTP over the network).
time:
  - platform: sntp
    id: sntp_time
    on_time:
      - hours: 0
        minutes: 0
        seconds: 0
        then:
          - lambda: |-
              id(temp_max_today) = NAN;
              id(temp_min_today) = NAN;
              id(cycles_today) = 0;
              id(on_time_today_s) = 0;

# DS18B20(s) on a single GPIO one-wire bus. 4.7 kΩ pull-up from data to 3V3.
one_wire:
  - platform: gpio
    pin: ${one_wire_pin}

# I2C bus for the OLED.
i2c:
  sda: ${display_sda_pin}
  scl: ${display_scl_pin}
  frequency: 400kHz

# Only the glyphs we actually draw, to keep flash small. '°' is the UTF-8
# degree sign (U+00B0) — it must be listed explicitly or "%.1f °C" prints blank.
font:
  - file: "gfonts://Roboto"
    id: font_temp
    size: 26
    glyphs: "0123456789.- °C"
  - file: "gfonts://Roboto"
    id: font_status         # bottom status line ("Heating mm:ss" / "Idle hh:mm:ss")
    size: 14
    glyphs: "Heating Idl:0123456789"   # unique glyphs only (Idle's e/d/l covered)
  - file: "gfonts://Roboto"
    id: font_stats          # page 2 daily-stats lines
    size: 13
    glyphs: "MaxinCyclesO 0123456789:.°-"
  # Material Design Icons — a friendlier face than plain text.
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icons          # large, left of the temperature
    size: 36
    glyphs:
      - "\U000F050F"  # mdi-thermometer
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/master/fonts/materialdesignicons-webfont.ttf"
    id: font_icon_small     # small corner status icons
    size: 18
    glyphs:
      - "\U000F0238"  # mdi-fire     (top-right: panel lamp / heating on)
      - "\U000F05A9"  # mdi-wifi     (top-left: WiFi connected)
      - "\U000F05AA"  # mdi-wifi-off (top-left: WiFi disconnected)

# GME12864-11/12/13 V3.2 = SSD1306 128x64 at I2C 0x3C.
# If the image is shifted/garbled, the module is the SH1106 variant instead:
# change `model` to "SH1106 128x64".
display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    pages:
      # ---- Page 1: live temperature + heating/idle timer ----
      - id: page_main
        lambda: |-
          float t = id(tank_top_temp).state;
          // Thermometer icon (always) on the left, temperature right-aligned.
          // Both vertically centered on the 64px-tall panel.
          it.print(8, 30, id(font_icons), TextAlign::CENTER_LEFT, "\U000F050F");
          if (isnan(t)) {
            it.print(120, 30, id(font_temp), TextAlign::CENTER_RIGHT, "-- °C");
          } else {
            it.printf(120, 30, id(font_temp), TextAlign::CENTER_RIGHT, "%.1f°C", t);
          }
          // Bottom-center status: time in the current heating state.
          // Heating -> fire + "Heating mm:ss"; Idle -> "Idle hh:mm:ss".
          uint32_t secs = (millis() - id(heater_changed_ms)) / 1000;
          if (id(heater_on).state) {
            it.print(30, 63, id(font_icon_small), TextAlign::BOTTOM_LEFT, "\U000F0238");
            it.printf(48, 63, id(font_status), TextAlign::BOTTOM_LEFT,
                      "Heating %u:%02u", secs / 60, secs % 60);
          } else if (secs >= 3600) {
            it.printf(64, 63, id(font_status), TextAlign::BOTTOM_CENTER,
                      "Idle %u:%02u:%02u", secs / 3600, (secs % 3600) / 60, secs % 60);
          } else {
            it.printf(64, 63, id(font_status), TextAlign::BOTTOM_CENTER,
                      "Idle %u:%02u", secs / 60, secs % 60);
          }
          // WiFi status in the top-left corner.
          if (WiFi.isConnected()) {
            it.print(0, 0, id(font_icon_small), TextAlign::TOP_LEFT, "\U000F05A9");
          } else {
            it.print(0, 0, id(font_icon_small), TextAlign::TOP_LEFT, "\U000F05AA");
          }
      # ---- Page 2: daily statistics (reset at midnight) ----
      - id: page_stats
        lambda: |-
          if (isnan(id(temp_max_today)))
            it.print(2, 0, id(font_stats), "Max --");
          else
            it.printf(2, 0, id(font_stats), "Max %.1f°C", id(temp_max_today));
          if (isnan(id(temp_min_today)))
            it.print(2, 16, id(font_stats), "Min --");
          else
            it.printf(2, 16, id(font_stats), "Min %.1f°C", id(temp_min_today));
          it.printf(2, 32, id(font_stats), "Cycles %u", id(cycles_today));
          // Daily on-time, including the in-progress segment if heating now.
          uint32_t on_s = id(on_time_today_s);
          if (id(heater_on).state) on_s += (millis() - id(heater_changed_ms)) / 1000;
          it.printf(2, 48, id(font_stats), "On %u:%02u:%02u",
                    on_s / 3600, (on_s % 3600) / 60, on_s % 60);

sensor:
  # ---- Heating indicator: LDR on A0 watching the 220 V panel lamp ----
  # The D1 mini's onboard 220k/100k divider makes A0 0–3.3 V tolerant, so a plain
  # LDR divider off 3V3 is safe (brighter -> higher reading). See the .md for the
  # circuit and tuning. The EMA smooths 100 Hz mains ripple / noise (τ ≈ 2 s).
  - platform: adc
    pin: A0
    id: heater_ldr
    name: "Heater Indicator LDR"
    internal: true                 # poll fast for threshold detection only — never
                                   # registered with the API/HA, so no state stream.
                                   # To re-tune ldr_threshold_on/off remotely, flip
                                   # this to `false` temporarily so the raw value is
                                   # exposed to HA again (or bump log_level to DEBUG
                                   # to read the "LDR raw" interval log below).
    update_interval: 200ms
    accuracy_decimals: 3
    filters:
      - exponential_moving_average:
          alpha: 0.7
          send_every: 1

  # ---- Top probe (active): clamped to external tank metal, replaces the dial ----
  # First flash with NO `address:` to discover the ROM in the logs, then pin it
  # so adding the second probe later can't reassign which sensor is which.
  #
  # The shared dallas_temp defaults (filters, resolution, poll interval) are
  # anchored here as &tank_probe_defaults and reused by the bottom probe below
  # via `<<: *tank_probe_defaults`. Only address/name/id (and the top's
  # on_value max/min tracker) differ per-probe.
  - <<: &tank_probe_defaults
      platform: dallas_temp
      update_interval: ${poll_interval}
      resolution: 12
      filters:
        - filter_out: 85.0   # DS18B20 power-on / failed-conversion reset value
        - filter_out: nan
        - or:                # publish on a real change OR at least every 10 min (heartbeat),
                             # so HA gets a periodic "still alive" datapoint while temp is flat
            - delta: 0.1     # change ≥0.1 °C (matches the 1-decimal display); drops every-poll resends
            - heartbeat: 10min
    address: 0x3156d9d446a61328
    name: "Tank Top Temperature"
    id: tank_top_temp
    on_value:
      then:
        - lambda: |-
            if (isnan(id(temp_max_today)) || x > id(temp_max_today)) id(temp_max_today) = x;
            if (isnan(id(temp_min_today)) || x < id(temp_min_today)) id(temp_min_today) = x;

  # ---- Bottom probe (FUTURE): inside the tank, added when heater is opened ----
  # When this is enabled, BOTH sensors MUST carry an explicit `address:` (the bus
  # is ambiguous with >1 device and the config will fail to validate otherwise).
  # Inherits platform / update_interval / resolution / filters from the top probe
  # via the YAML merge key — only the per-probe keys are listed.
  # - <<: *tank_probe_defaults
  #   address: 0x0000000000000000
  #   name: "Tank Bottom Temperature"
  #   id: tank_bottom_temp

  # ---- Lifetime counters exposed to HA (feed a utility_meter for daily/weekly/
  # monthly). total_increasing tolerates the reboot-to-0 as a meter reset.
  # On-time includes the in-progress heating segment so it rises smoothly. ----
  - platform: template
    name: "Heating On-time"
    id: heating_on_time_total
    device_class: duration
    unit_of_measurement: min
    state_class: total_increasing
    accuracy_decimals: 1
    update_interval: 60s
    lambda: |-
      uint32_t s = id(on_time_total_s);
      if (id(heater_on).state) s += (millis() - id(heater_changed_ms)) / 1000;
      return s / 60.0f;
  - platform: template
    name: "Heating Cycles"
    id: heating_cycles_total
    state_class: total_increasing
    accuracy_decimals: 0
    update_interval: 60s
    lambda: 'return id(cycles_total);'

# ---- "Heating" from the LDR (analog_threshold w/ hysteresis) -------------
# On each transition: stamp heater_changed_ms (drives the timer), count a
# cycle on turn-on, and fold the just-ended ON period into the daily on-time
# on turn-off. (Merges with the `status` binary_sensor from common/base.yaml.)
binary_sensor:
  - platform: analog_threshold
    id: heater_on
    name: "Heating"
    sensor_id: heater_ldr
    device_class: heat
    threshold:
      upper: ${ldr_threshold_on}
      lower: ${ldr_threshold_off}
    on_press:
      then:
        - lambda: |-
            id(heater_changed_ms) = millis();
            id(cycles_today) += 1;
            id(cycles_total) += 1;
    on_release:
      then:
        - lambda: |-
            uint32_t dur = (millis() - id(heater_changed_ms)) / 1000;
            id(on_time_today_s) += dur;
            id(on_time_total_s) += dur;
            id(heater_changed_ms) = millis();

interval:
# ---- TEMP tuning aid -----------------------------------------------------
# The generic sensor value is logged at VERBOSE, so it's invisible at the
# default DEBUG level. This prints the (EMA-filtered) LDR value every second
# so you can read lamp-off vs lamp-on and set ldr_threshold_on/off.
# REMOVE this block once the thresholds are calibrated.
  # - interval: 1s
  #   then:
  #     - logger.log:
  #         format: "LDR raw = %.3f"
  #         args: ['id(heater_ldr).state']
  # Page rotation with per-page dwell: page 1 for 15 s, page 2 for 5 s.
  - interval: 1s
    then:
      - lambda: |-
          uint32_t now = millis();
          bool on_stats = id(oled).get_active_page() == id(page_stats);
          uint32_t dwell = on_stats ? 5000 : 15000;
          if (now - id(page_changed_ms) >= dwell) {
            id(oled).show_page(on_stats ? id(page_main) : id(page_stats));
            id(oled).update();
            id(page_changed_ms) = now;
          }
